[delayed_gcode DRYING_TIMER]
gcode:
    {% set elapsed = printer["gcode_macro START_DRYING"].elapsed|int + 1 %}
    {% set total = printer["gcode_macro START_DRYING"].total_duration|int %}

    SET_GCODE_VARIABLE MACRO=START_DRYING VARIABLE=elapsed VALUE={elapsed}

    {% if elapsed >= total %}
        STOP_DRYING
    {% else %}
        UPDATE_DELAYED_GCODE ID=DRYING_TIMER DURATION=1
    {% endif %}


[gcode_macro STOP_DRYING]
description: Apaga el calentamiento, restaura el timeout y envia notificaciones
gcode:
    {% set old_t = printer["gcode_macro START_DRYING"].old_timeout %}

    UPDATE_DELAYED_GCODE ID=DRYING_TIMER DURATION=0

    M140 S0
    SET_IDLE_TIMEOUT TIMEOUT={old_t}

    SET_GCODE_VARIABLE MACRO=START_DRYING VARIABLE=start_time VALUE=0
    SET_GCODE_VARIABLE MACRO=START_DRYING VARIABLE=total_duration VALUE=0
    SET_GCODE_VARIABLE MACRO=START_DRYING VARIABLE=elapsed VALUE=0

    RESPOND PREFIX="info" MSG="El proceso de secado ha finalizado. Cama apagada."
    RESPOND PREFIX="tgalarm" MSG="✅ Secado de filamento finalizado. Ya puedes imprimir!"


[gcode_macro START_DRYING]
description: Inicia el proceso de secado con notificaciones y cambio de timeout
variable_old_timeout: 600
variable_start_time: 0
variable_total_duration: 0
variable_elapsed: 0

gcode:
    {% if printer["gcode_macro START_DRYING"].start_time|float > 0 %}
        RESPOND PREFIX="error" MSG="El secado ya esta en curso!"
        RETURN
    {% endif %}

    {% if printer.heater_bed.target > 0 %}
        RESPOND PREFIX="error" MSG="La cama ya esta en uso!"
        RETURN
    {% endif %}

    {% set MATERIAL = params.MATERIAL|default("PLA")|upper %}
    {% set TIME = params.TIME|default(4)|float %}
    {% set time_s = (TIME * 3600)|int %}
    {% set current_timeout = printer.idle_timeout.timeout|default(600)|int %}

    SET_GCODE_VARIABLE MACRO=START_DRYING VARIABLE=old_timeout VALUE={current_timeout}
    SET_GCODE_VARIABLE MACRO=START_DRYING VARIABLE=start_time VALUE=1
    SET_GCODE_VARIABLE MACRO=START_DRYING VARIABLE=total_duration VALUE={time_s}
    SET_GCODE_VARIABLE MACRO=START_DRYING VARIABLE=elapsed VALUE=0

    SET_IDLE_TIMEOUT TIMEOUT={time_s + 1800}

    {% set temps = {"PLA":45, "PETG":65, "ABS":80, "TPU":50} %}
    {% set temp = temps.get(MATERIAL, 45) %}

    RESPOND PREFIX="info" MSG="Secado de {MATERIAL} iniciado por {TIME} horas a {temp}C."
    RESPOND PREFIX="tgalarm" MSG="🚀 Secado de filamento {MATERIAL} iniciado. Terminara en {TIME}h."

    M140 S{temp}
    M107
    M84

    UPDATE_DELAYED_GCODE ID=DRYING_TIMER DURATION=1

    RESPOND MSG="Para ver el estado usa el comando DRYING_STATUS"


[gcode_macro DRYING_STATUS]
description: Muestra el tiempo restante de secado
gcode:
    {% set start_time = printer["gcode_macro START_DRYING"].start_time|float %}
    {% set total_duration = printer["gcode_macro START_DRYING"].total_duration|int %}
    {% set elapsed = printer["gcode_macro START_DRYING"].elapsed|int %}
    {% set target_temp = printer.heater_bed.target|float %}

    {% if start_time > 0 and target_temp > 0 %}
        {% set remaining = [total_duration - elapsed, 0]|max %}

        {% if remaining > 0 %}
            {% set hours = (remaining // 3600)|int %}
            {% set minutes = ((remaining % 3600) // 60)|int %}
            {% set seconds = (remaining % 60)|int %}
            RESPOND MSG="⏳ Tiempo restante de secado: {hours}h {minutes}m {seconds}s"
            M117 {hours}h {minutes}m {seconds}s
        {% else %}
            RESPOND MSG="✅ Secado completado (esperando finalizacion)."
        {% endif %}
    {% else %}
        RESPOND MSG="❌ El secado no esta en curso actualmente."
    {% endif %}

[gcode_macro DRY_PLA]
gcode:
    START_DRYING MATERIAL=PLA TIME=4

[gcode_macro DRY_PETG]
gcode:
    START_DRYING MATERIAL=PETG TIME=4

[gcode_macro DRY_TPU]
gcode:
    START_DRYING MATERIAL=TPU TIME=6

[gcode_macro DRY_ABS]
gcode:
    START_DRYING MATERIAL=ABS TIME=6
